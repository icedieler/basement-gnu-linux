inherit: [cmake, windowing]

metaEnvironment:
    PKG_LICENSE: "Apache-2.0"
    PKG_VERSION: "3.23.0"

depends:
    - libs::alsa-lib-dev
    - libs::openssl-dev
    - if: "${WINDOWING_X11}"
      depends:
          - libs::xorg::libxkbfile-dev
          - libs::xorg::libX11-dev
          - libs::xorg::libXcursor-dev
          - libs::xorg::libXi-dev
          - libs::xorg::libXinerama-dev
          - libs::xorg::libXv-dev
          - libs::xorg::libXrandr-dev
    - libs::zlib-dev
    - use: []
      depends:
          - libs::alsa-lib-tgt
          - libs::openssl-tgt
          - if: "${WINDOWING_X11}"
            depends:
                - libs::xorg::libxkbfile-tgt
                - libs::xorg::libX11-tgt
                - libs::xorg::libXcursor-tgt
                - libs::xorg::libXi-tgt
                - libs::xorg::libXinerama-tgt
                - libs::xorg::libXv-tgt
                - libs::xorg::libXrandr-tgt
          - libs::zlib-tgt

checkoutSCM:
    scm: url
    url: https://pub.freerdp.com/releases/freerdp-${PKG_VERSION}.tar.xz
    digestSHA256: c4f7b3763d2915c1db6806f055f3573b640331adfaf722a8735d740378c1b5bb
    stripComponents: 1

buildScript: |
    cmakeBuild $1 \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_VERBOSE_MAKEFILE=ON \
          -DCMAKE_SKIP_RPATH=TRUE \
          -DCMAKE_SKIP_INSTALL_RPATH=TRUE \
          -DBUILD_TESTING=OFF \
          -DWITH_GPROF=OFF \
          -DWITH_MANPAGES=OFF \
          -DWITH_PROFILER=OFF \
          -DWITH_SAMPLE=OFF \
          -DWITH_ALSA=ON \
          -DWITH_UNICODE_BUILTIN=ON \
          -DWITH_CLIENT_SDL=OFF \
          -DWITH_CUPS=OFF \
          -DWITH_CAIRO=OFF \
          -DCHANNEL_URBDRC=OFF \
          -DWITH_FUSE=OFF \
          -DWITH_X11=$(windowingX11 && echo ON || echo OFF) \
          -DWITH_SWSCALE=OFF \
          -DWITH_KRB5=OFF \
          -DWITH_PULSE=OFF \
          -DWITH_FFMPEG=OFF \
          -DWITH_SERVER=OFF \
          -DWITH_SERVER_INTERFACE=OFF \
          -DWITH_THIRD_PARTY=OFF

provideDeps: ['*-tgt']
packageScript: |
    cmakePackageTgt
