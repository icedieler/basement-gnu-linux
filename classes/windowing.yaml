Config:
    WINDOWING_WAYLAND:
        type: bool
        default: false
    WINDOWING_X11:
        type: bool
        default: false

buildVars: [WINDOWING_WAYLAND, WINDOWING_X11]
buildSetup: |
    windowingWayland() {
        [[ ${WINDOWING_WAYLAND} -eq 1 ]]
    }
    windowingX11() {
        [[ ${WINDOWING_X11} -eq 1 ]]
    }
